# Deploy 엘리가오더 to Vercel on every push.
# - main  → production (https://new-eliga.vercel.app)
# - other branches / PRs → preview URL
#
# Required repository secrets:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

name: Deploy Vercel

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  # Pin CLI so CI does not break on unexpected major releases
  VERCEL_CLI_VERSION: 41.7.8

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    # Fork PRs cannot use secrets — skip deploy there
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      environment: ${{ steps.meta.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g "vercel@${VERCEL_CLI_VERSION}"

      - name: Resolve target
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
            echo "pull_env=preview" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
            echo "pull_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
            echo "pull_env=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel project settings
        run: >
          vercel pull --yes
          --environment=${{ steps.meta.outputs.pull_env }}
          --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: >
          vercel build
          ${{ steps.meta.outputs.prod_flag }}
          --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          set -euo pipefail
          URL=$(vercel deploy --prebuilt --yes ${{ steps.meta.outputs.prod_flag }} --token="${{ secrets.VERCEL_TOKEN }}")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Summary
        run: |
          {
            echo "## Deploy Result"
            echo ""
            echo "- **URL**: ${{ steps.deploy.outputs.url }}"
            echo "- **Target**: ${{ steps.meta.outputs.environment }}"
            echo "- **Commit**: \`${{ github.sha }}\`"
            echo "- **Ref**: \`${{ github.ref_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = `### Vercel Preview\n\n${url}\n\n_Commit \`${{ github.sha }}\`_`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '### Vercel Preview';
            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
