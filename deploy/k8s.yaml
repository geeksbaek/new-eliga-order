apiVersion: v1
kind: Namespace
metadata:
  name: new-eliga-order
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-eliga-order
  namespace: new-eliga-order
  labels:
    app: new-eliga-order
  annotations:
    argocd.argoproj.io/tracking-id: INFRA_MANAGE_SYSDEVTOOLS_new-eliga-order.dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: new-eliga-order
  template:
    metadata:
      labels:
        app: new-eliga-order
    spec:
      containers:
        - name: app
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3456
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3456"
            - name: NODE_ENV
              value: production
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              apk add --no-cache git >/dev/null
              if [ ! -f /data/server.mjs ]; then
                git clone --depth 1 https://github.com/geeksbaek/new-eliga-order.git /data
                cd /data
                npm ci --omit=dev
                # need devDeps for build tools - install all for build
                npm ci
                npm run build
              fi
              cd /data
              exec node server.mjs
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: new-eliga-order
  namespace: new-eliga-order
  labels:
    app: new-eliga-order
spec:
  type: ClusterIP
  selector:
    app: new-eliga-order
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: new-eliga-order
  namespace: new-eliga-order
  labels:
    app: new-eliga-order
  annotations:
    # Prefer public VIP when controller supports it
    kakaoi.io/public-vip: "true"
spec:
  ingressClassName: kakao
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: new-eliga-order
                port:
                  number: 80
